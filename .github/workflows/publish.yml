name: Publish to Typst Universe

# Runs weekly (Monday 09:00 UTC) and on manual dispatch.
# Discovers release tags from the past N days not yet published to typst/packages
# and submits each via the typst-packages-shim fork.
#
# dry_run (manual default: false for schedule, true for dispatch):
#   Prepares shim branches but skips opening upstream PRs.

on:
  schedule:
    - cron: '0 9 * * 1'  # Weekly, Monday 09:00 UTC
  workflow_dispatch:
    inputs:
      since_days:
        description: 'Look back N days for release tags'
        type: number
        default: 8
      dry_run:
        description: 'Prepare shim branches but skip opening upstream PRs'
        type: boolean
        default: true

jobs:
  # ── Discover which release tags from the past N days are not yet upstream ──
  discover:
    name: Discover unpublished releases
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.scan.outputs.matrix }}
      count:  ${{ steps.scan.outputs.count }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --tags --prune

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Scan for unpublished release tags
        id: scan
        env:
          GH_TOKEN: ${{ secrets.TYPST_PACKAGES_PAT }}
          SINCE_DAYS: ${{ inputs.since_days || 8 }}
        run: node .github/scripts/discover-releases.js --since-days "$SINCE_DAYS"

  # ── Publish each discovered release to the shim fork and upstream ─────────
  publish:
    name: Publish ${{ matrix.package_name }}@${{ matrix.version }}
    needs: discover
    if: needs.discover.outputs.count != '0'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        include: ${{ fromJson(needs.discover.outputs.matrix) }}
      fail-fast: false

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --tags --prune

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      # ── 1. Validate package structure and version consistency ─────────────
      - name: Validate package
        run: |
          PACKAGE_DIR="packages/${{ matrix.package_name }}"
          VERSION="${{ matrix.version }}"

          if [[ ! -d "$PACKAGE_DIR" ]]; then
            echo "::error::Package directory not found: $PACKAGE_DIR"
            exit 1
          fi

          if [[ ! -f "$PACKAGE_DIR/typst.toml" ]]; then
            echo "::error::typst.toml not found in $PACKAGE_DIR"
            exit 1
          fi

          TOML_VERSION=$(node -e "
const t = require('fs').readFileSync('$PACKAGE_DIR/typst.toml', 'utf8');
const m = t.match(/^version\s*=\s*\"([^\"]+)\"/m);
if (!m) process.exit(1);
process.stdout.write(m[1]);
")
          if [[ "$TOML_VERSION" != "$VERSION" ]]; then
            echo "::error::Version mismatch: tag says $VERSION but typst.toml says $TOML_VERSION"
            exit 1
          fi

          if [[ ! -f "$PACKAGE_DIR/README.md" ]]; then
            echo "::error::README.md missing from $PACKAGE_DIR"
            exit 1
          fi

          if [[ ! -f "$PACKAGE_DIR/LICENSE" && ! -f "$PACKAGE_DIR/LICENSE.md" ]]; then
            echo "::error::LICENSE or LICENSE.md missing from $PACKAGE_DIR"
            exit 1
          fi

          echo "Validation passed: ${{ matrix.package_name }}@$VERSION"

      # ── 2. Lint via typst-package-check ───────────────────────────────────
      - name: Cache Cargo bin
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin
          key: ${{ runner.os }}-cargo-bin-typst-package-check

      - name: Install typst-package-check
        run: |
          if ! command -v typst-package-check &>/dev/null; then
            cargo install typst-package-check --locked
          fi

      - name: Lint
        run: typst-package-check packages/${{ matrix.package_name }}

      # ── 3. Sync shim fork to upstream HEAD ────────────────────────────────
      - name: Sync shim fork to upstream
        env:
          GH_TOKEN: ${{ secrets.TYPST_PACKAGES_PAT }}
        run: |
          RESULT=$(gh api repos/chaoticgoodcomputing/typst-packages-shim/merge-upstream \
            -X POST -f branch=main --jq '.merge_type')
          echo "Fork sync result: $RESULT"

          if [[ "$RESULT" == "diverged" ]]; then
            echo "::warning::Fork diverged from upstream — hard-resetting main to upstream HEAD"
            UPSTREAM_SHA=$(gh api repos/typst/packages/git/ref/heads/main --jq '.object.sha')
            gh api repos/chaoticgoodcomputing/typst-packages-shim/git/refs/heads/main \
              -X PATCH -f sha="$UPSTREAM_SHA" -f force=true
            echo "::warning::Fork reset to $UPSTREAM_SHA"
          fi

      # ── 4. Create branch on shim fork ─────────────────────────────────────
      - name: Get shim fork HEAD SHA
        id: fork_head
        env:
          GH_TOKEN: ${{ secrets.TYPST_PACKAGES_PAT }}
        run: |
          SHA=$(gh api repos/chaoticgoodcomputing/typst-packages-shim/git/ref/heads/main \
            --jq '.object.sha')
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

      - name: Create branch on shim fork
        id: branch
        env:
          GH_TOKEN: ${{ secrets.TYPST_PACKAGES_PAT }}
        run: |
          BRANCH="add/${{ matrix.package_name }}-${{ matrix.version }}"

          EXISTING=$(gh api "repos/chaoticgoodcomputing/typst-packages-shim/git/ref/heads/$BRANCH" \
            --jq '.ref' 2>/dev/null || echo "")

          if [[ -n "$EXISTING" ]]; then
            echo "Branch $BRANCH already exists — deleting for clean re-run"
            gh api "repos/chaoticgoodcomputing/typst-packages-shim/git/refs/heads/$BRANCH" -X DELETE
          fi

          gh api repos/chaoticgoodcomputing/typst-packages-shim/git/refs \
            -X POST \
            -f ref="refs/heads/$BRANCH" \
            -f sha="${{ steps.fork_head.outputs.sha }}"

          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "Created branch: $BRANCH"

      # ── 5. Assemble and push package tree to shim fork ────────────────────
      - name: Assemble package tree on shim fork
        env:
          GH_TOKEN: ${{ secrets.TYPST_PACKAGES_PAT }}
        run: |
          node .github/scripts/push-package-tree.js \
            --package-name "${{ matrix.package_name }}" \
            --version      "${{ matrix.version }}" \
            --branch       "${{ steps.branch.outputs.branch }}" \
            --fork         "chaoticgoodcomputing/typst-packages-shim"

      # ── 6. Open PR on typst/packages (skipped for dry runs) ───────────────
      - name: Check for existing PR
        id: pr_check
        if: ${{ inputs.dry_run != true }}
        env:
          GH_TOKEN: ${{ secrets.TYPST_PACKAGES_PAT }}
        run: |
          BRANCH="${{ steps.branch.outputs.branch }}"
          EXISTING=$(gh api \
            "repos/typst/packages/pulls?head=chaoticgoodcomputing:$BRANCH&state=open" \
            --jq '.[0].html_url' 2>/dev/null || echo "")
          echo "existing_url=$EXISTING" >> "$GITHUB_OUTPUT"

      - name: Build PR payload
        if: ${{ inputs.dry_run != true && steps.pr_check.outputs.existing_url == '' }}
        env:
          PACKAGE_NAME: ${{ matrix.package_name }}
          VERSION:      ${{ matrix.version }}
          BRANCH:       ${{ steps.branch.outputs.branch }}
        run: node .github/scripts/build-pr-payload.js

      - name: Open PR on typst/packages
        if: ${{ inputs.dry_run != true && steps.pr_check.outputs.existing_url == '' }}
        env:
          GH_TOKEN: ${{ secrets.TYPST_PACKAGES_PAT }}
        run: |
          PR_URL=$(gh api repos/typst/packages/pulls \
            -X POST --input /tmp/pr_payload.json --jq '.html_url')
          echo "::notice::PR opened: $PR_URL"
          echo "## PR Opened" >> "$GITHUB_STEP_SUMMARY"
          echo "$PR_URL"      >> "$GITHUB_STEP_SUMMARY"

      - name: PR already open (skipping)
        if: ${{ inputs.dry_run != true && steps.pr_check.outputs.existing_url != '' }}
        run: echo "::notice::PR already exists — ${{ steps.pr_check.outputs.existing_url }}"

      - name: Dry run complete
        if: ${{ inputs.dry_run == true }}
        run: |
          echo "## Dry Run Complete"                                                >> "$GITHUB_STEP_SUMMARY"
          echo ""                                                                   >> "$GITHUB_STEP_SUMMARY"
          echo "Branch \`${{ steps.branch.outputs.branch }}\` pushed to shim."   >> "$GITHUB_STEP_SUMMARY"
          echo "Re-run with **dry run** unchecked to open the upstream PR."        >> "$GITHUB_STEP_SUMMARY"
